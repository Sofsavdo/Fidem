<!doctype html>
<html lang="uz">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#F0269D" />
    <meta name="description" content="FIDEM — Serious Dating & Matchmaking platform" />

    <!-- Apply the saved / system / Telegram theme before first paint (no flash) -->
    <script>
      (function () {
        try {
          var pref = localStorage.getItem("fidem_theme") || "system";
          var tg = window.Telegram && window.Telegram.WebApp;
          var sys = tg && tg.colorScheme
            ? tg.colorScheme
            : (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
          var dark = pref === "dark" || (pref === "system" && sys === "dark");
          document.documentElement.classList.toggle("dark", dark);
        } catch (e) {}
      })();
    </script>

    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/logo.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/logo.svg" />

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="FIDEM" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <title>FIDEM — Serious Dating & Matchmaking</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
      window.addEventListener(
        "error",
        function (e) {
          if (
            e.error instanceof DOMException &&
            e.error.name === "DataCloneError" &&
            e.message &&
            e.message.includes("PerformanceServerTiming")
          ) {
            e.stopImmediatePropagation();
            e.preventDefault();
          }
        },
        true
      );
    </script>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
