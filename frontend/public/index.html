<!doctype html>
<html lang="uz">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#F0269D" />
    <meta name="description" content="FIDEM — jiddiy tanishuv va turmush qurish uchun ishonchli platforma. Tasdiqlangan profillar, xavfsiz muloqot, aniq moslik algoritmi." />
    <link rel="canonical" href="https://fidem.up.railway.app/" />

    <!-- Open Graph / Telegram / Facebook / Instagram link-preview cards -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="FIDEM" />
    <meta property="og:title" content="FIDEM — Serious Dating & Matchmaking" />
    <meta property="og:description" content="Jiddiy tanishuv va turmush qurish uchun ishonchli platforma. Tasdiqlangan profillar, xavfsiz muloqot." />
    <meta property="og:image" content="https://fidem.up.railway.app/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://fidem.up.railway.app/" />
    <meta property="og:locale" content="uz_UZ" />

    <!-- Twitter/X card (falls back to summary_large_image if og:image is present) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FIDEM — Serious Dating & Matchmaking" />
    <meta name="twitter:description" content="Jiddiy tanishuv va turmush qurish uchun ishonchli platforma." />
    <meta name="twitter:image" content="https://fidem.up.railway.app/og-image.jpg" />

    <!-- Apply the saved / system / Telegram theme before first paint (no flash) -->
    <script>
      (function () {
        try {
          var pref = localStorage.getItem("fidem_theme") || "system";
          var tg = window.Telegram && window.Telegram.WebApp;
          var sys = tg && tg.colorScheme
            ? tg.colorScheme
            : (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
          var dark = pref === "dark" || (pref === "system" && sys === "dark");
          document.documentElement.classList.toggle("dark", dark);
        } catch (e) {}
      })();
    </script>

    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/logo.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/logo.svg" />

    <!-- Start the TLS handshake to the API while the JS bundle is still
         downloading — saves a round-trip on the first real request. -->
    <link rel="preconnect" href="%REACT_APP_BACKEND_URL%" crossorigin />

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="FIDEM" />

    <!-- Fonts are self-hosted (@fontsource/outfit + @fontsource/manrope,
         imported in src/index.js) — no Google Fonts round-trip on boot. -->

    <title>FIDEM — Serious Dating & Matchmaking</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
      window.addEventListener(
        "error",
        function (e) {
          if (
            e.error instanceof DOMException &&
            e.error.name === "DataCloneError" &&
            e.message &&
            e.message.includes("PerformanceServerTiming")
          ) {
            e.stopImmediatePropagation();
            e.preventDefault();
          }
        },
        true
      );
    </script>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <!-- Instant boot splash: pure HTML/CSS, painted before any JS loads, so
         the user sees the animated brand mark instead of a blank screen /
         generic skeleton while the bundle downloads. React replaces #root's
         content on mount, which removes it automatically. -->
    <style>
      #boot-splash { position: fixed; inset: 0; display: grid; place-items: center; background: #fbf7fa; }
      .dark #boot-splash { background: #1a1224; }
      #boot-splash .track { opacity: 0.16; }
      #boot-splash .draw { stroke-dasharray: 0.3 0.7; animation: bootsweep 1.5s linear infinite; }
      @keyframes bootsweep { to { stroke-dashoffset: -1; } }
    </style>
    <div id="root"><div id="boot-splash"><svg width="88" height="88" viewBox="0 0 100 100" fill="none">
      <g stroke-width="15" stroke-linecap="round">
        <path class="track" d="M50 80 C 30 60, 12 52, 15 33 C 17 21, 37 20, 46 35 C 49 40, 50 45, 50 45" stroke="#F0269D" pathLength="1"/>
        <path class="track" d="M50 80 C 70 60, 88 52, 85 33 C 83 21, 63 20, 54 35 C 51 40, 50 45, 50 45" stroke="#8A2BE2" pathLength="1"/>
        <path class="draw" d="M50 80 C 30 60, 12 52, 15 33 C 17 21, 37 20, 46 35 C 49 40, 50 45, 50 45" stroke="#F0269D" pathLength="1"/>
        <path class="draw" d="M50 80 C 70 60, 88 52, 85 33 C 83 21, 63 20, 54 35 C 51 40, 50 45, 50 45" stroke="#8A2BE2" pathLength="1"/>
      </g>
    </svg></div></div>
  </body>
</html>
